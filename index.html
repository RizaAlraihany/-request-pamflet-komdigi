<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Pamflet - Divisi Komdigi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="text-slate-800 antialiased min-h-screen sm:p-6 lg:p-8 flex justify-center items-start"
  >
    <div
      class="w-full max-w-2xl bg-white sm:rounded-[2rem] sm:shadow-xl sm:shadow-slate-200/50 overflow-hidden sm:border border-slate-100"
    >
      <!-- Header -->
      <div
        class="bg-gradient-to-br from-slate-900 to-slate-800 px-6 py-8 sm:px-10 sm:py-10 text-white relative overflow-hidden"
      >
        <!-- Decorative background elements -->
        <div
          class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-5 rounded-full blur-2xl"
        ></div>
        <div
          class="absolute bottom-0 right-20 w-32 h-32 bg-blue-500 opacity-10 rounded-full blur-2xl"
        ></div>

        <div class="relative z-10 flex items-start justify-between">
          <div>
            <div
              class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-white/10 backdrop-blur-sm mb-4"
            >
              <i class="fas fa-paint-roller text-blue-300"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight mb-1">
              Request Pamflet
            </h1>
            <p class="text-slate-300 text-sm sm:text-base font-medium">
              Divisi Komdigi <span class="mx-2 text-slate-500">•</span> Form
              Request Desain Pamflet/Poster
            </p>
          </div>
        </div>
      </div>

      <!-- Form Content -->
      <form id="requestForm" class="px-5 py-6 sm:px-10 sm:py-8 space-y-8">
        <!-- Alert Card -->
        <div
          class="bg-amber-50/80 border border-amber-200/60 rounded-2xl p-4 flex gap-3 items-start shadow-sm shadow-amber-100/50"
        >
          <div class="mt-0.5 text-amber-500 bg-amber-100/50 p-1.5 rounded-lg">
            <i class="fas fa-coffee text-sm"></i>
          </div>
          <div>
            <h3 class="text-sm font-bold text-amber-900 mb-0.5">
              Ketentuan Revisi
            </h3>
            <p class="text-sm text-amber-700/90 leading-relaxed">
              Revisi maksimal 1x. Lebih dari itu kena charge kopi untuk tim
              komdigi ☕
            </p>
          </div>
        </div>

        <div class="space-y-6">
          <!-- 1. Penyelenggara & Acara -->
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Nama Divisi / Penyelenggara
                <span class="text-red-500">*</span></label
              >
              <input
                type="text"
                id="namaDepartemen"
                required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                placeholder="Contoh: Departemen Komdigi"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Nama Acara / Kegiatan
                <span class="text-red-500">*</span></label
              >
              <input
                type="text"
                id="namaAcara"
                required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                placeholder="Contoh: Webinar AI Masa Depan"
              />
            </div>
          </div>

          <!-- 2. Info Wajib Card -->
          <div
            class="bg-white border border-slate-200 shadow-sm rounded-2xl p-5 sm:p-6 space-y-5 relative overflow-hidden"
          >
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>

            <h2
              class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-2"
            >
              <i class="fas fa-list-check text-slate-400"></i> Info Utama
              Pamflet
            </h2>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                Tema Acara
                <span class="text-slate-400 font-normal text-xs ml-1"
                  >(Opsional)</span
                >
              </label>
              <input
                type="text"
                id="infoTema"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                placeholder="Cth: Mengukir Prestasi di Era Digital"
              />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                  >Hari, Tanggal <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  id="infoTanggal"
                  required
                  class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                  placeholder="Cth: Senin, 17 Agustus 2026"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                  >Jam <span class="text-red-500">*</span></label
                >
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    id="infoJamMulai"
                    required
                    pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                    title="Gunakan format 24 jam (Contoh: 13:00)"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-center text-sm sm:text-base"
                    placeholder="08:00"
                  />
                  <span class="text-slate-400 font-medium">-</span>
                  <input
                    type="text"
                    id="infoJamSelesai"
                    pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                    title="Gunakan format 24 jam (Contoh: 15:30)"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-center text-sm sm:text-base"
                    placeholder="opsional"
                  />
                </div>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Tempat / Link <span class="text-red-500">*</span></label
              >
              <input
                type="text"
                id="infoTempat"
                required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                placeholder="Cth: Zoom / Ruang Aula"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Contact Person (CP) <span class="text-red-500">*</span></label
              >
              <textarea
                id="infoCP"
                rows="2"
                required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base resize-none"
                placeholder="Cth: 0812-3456-7890 (Budi)&#10;0812-9876-5432 (Siti)"
              ></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                Caption Singkat
                <span class="text-slate-400 font-normal text-xs ml-1"
                  >(Opsional)</span
                >
              </label>
              <textarea
                id="captionSingkat"
                rows="3"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base resize-none"
                placeholder="Tulis caption poster. Max 2-3 kalimat"
              ></textarea>
            </div>
          </div>

          <!-- 3. Lampiran & Referensi -->
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Lampiran</label
              >
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
                >
                  <i class="fas fa-link text-slate-400"></i>
                </div>
                <input
                  type="url"
                  id="lampiran"
                  class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                  placeholder="Link GDrive foto/logo"
                />
              </div>
              <p class="text-[13px] text-slate-500 mt-2 ml-1">
                Atau kirim file/foto langsung ke chat WA setelah klik tombol di
                bawah.
              </p>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                Referensi Desain
                <span class="text-slate-400 font-normal text-xs ml-1"
                  >(Opsional)</span
                >
              </label>
              <input
                type="url"
                id="referensi"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                placeholder="Link Pinterest, IG, dll"
              />
            </div>
          </div>

          <!-- 4. PJ Divisi Card -->
          <div
            class="bg-slate-50 border border-slate-200 rounded-2xl p-5 sm:p-6 space-y-5"
          >
            <h2
              class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-2"
            >
              Penanggung Jawab (PJ)
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                  >Nama Lengkap <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  id="pjNama"
                  required
                  class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                  placeholder="Nama Anda"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5"
                  >No WhatsApp <span class="text-red-500">*</span></label
                >
                <input
                  type="tel"
                  id="pjWA"
                  required
                  class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base"
                  placeholder="08xxxxxxxxxxx"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div
          class="pt-4 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 sm:gap-4"
        >
          <button
            type="button"
            onclick="document.getElementById('requestForm').reset()"
            class="w-full sm:w-auto px-6 py-3.5 sm:py-3 rounded-xl text-slate-500 font-semibold hover:bg-slate-100 hover:text-slate-700 transition-colors text-sm sm:text-base"
          >
            Reset Form
          </button>
          <button
            type="submit"
            class="w-full sm:w-auto px-8 py-3.5 sm:py-3 bg-[#25D366] hover:bg-[#1EBE5C] text-white rounded-xl font-bold shadow-lg shadow-green-500/30 hover:shadow-green-500/40 transition-all flex items-center justify-center gap-2.5 text-sm sm:text-base"
          >
            <i class="fab fa-whatsapp text-lg"></i>
            Kirim ke WhatsApp
          </button>
        </div>
      </form>
    </div>

    <script src="index.js"></script>
  </body>
</html>
